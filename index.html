    .pg{columns:1}.sg{grid-template-columns:1fr}.pcs{grid-template-columns:1fr}
    .fw{flex-direction:column;text-align:center}.ni{padding:0 16px}.cg{display:none}
}
</style>

<nav id="nv"><div class="ni"><a href="#home" class="logo" id="lg"></a><div class="hm" id="hm" onclick="this.classList.toggle('on');document.getElementById('nl').classList.toggle('open')"><span></span><span></span><span></span></div>
<ul class="nl" id="nl"><li><a href="#home" onclick="cm()">Home</a></li><li><a href="#services" onclick="cm()">Services</a></li><li><a href="#projects" onclick="cm()">Projects</a></li><li><a href="#pricing" onclick="cm()">Pricing</a></li><li><a href="#contact" onclick="cm()">Contact</a></li><li><span class="cb o" id="ncb"><span class="dot"></span><span id="nct">OPEN</span></span></li></ul></div></nav>

<div class="sts" id="hst"></div>
</div><div class="scl"></div></section><div class="dv"></div>

<script>
let cO=COMMISSIONS_OPEN,jbOk=false,fI=0;
const pfp=`https://unavatar.io/twitter/${SITE.twitter}`;

// PARTICLES
const cv=document.getElementById("bgC"),cx=cv.getContext("2d");let pp=[],W,H;
function rsz(){W=cv.width=innerWidth;H=cv.height=innerHeight}addEventListener("resize",rsz);rsz();
class Pt{constructor(){this.r_()}r_(){this.x=Math.random()*W;this.y=Math.random()*H;this.vx=(Math.random()-.5)*.12;this.vy=(Math.random()-.5)*.12;this.r=Math.random()*1+.3;this.a=Math.random()*.08+.02;this.l=Math.random()*500+200;this.g=0}
u(){this.x+=this.vx;this.y+=this.vy;this.g++;if(this.g>this.l||this.x<0||this.x>W||this.y<0||this.y>H)this.r_()}
d(){const f=1-this.g/this.l;cx.beginPath();cx.arc(this.x,this.y,this.r,0,Math.PI*2);cx.fillStyle=`rgba(255,255,255,${this.a*f})`;cx.fill()}}
for(let i=0;i<40;i++)pp.push(new Pt);
!function ab(){cx.clearRect(0,0,W,H);pp.forEach(p=>{p.u();p.d()});
for(let i=0;i<pp.length;i++)for(let j=i+1;j<pp.length;j++){const dx=pp[i].x-pp[j].x,dy=pp[i].y-pp[j].y,d=Math.sqrt(dx*dx+dy*dy);
if(d<100){cx.beginPath();cx.moveTo(pp[i].x,pp[i].y);cx.lineTo(pp[j].x,pp[j].y);cx.strokeStyle=`rgba(255,255,255,${.01*(1-d/100)})`;cx.stroke()}}
requestAnimationFrame(ab)}();

document.addEventListener("mousemove",e=>{const g=document.getElementById("cur");if(g){g.style.left=e.clientX+"px";g.style.top=e.clientY+"px"}});
document.addEventListener("click",e=>{const r=document.createElement("div");r.className="rp";r.style.cssText=`left:${e.clientX-10}px;top:${e.clientY-10}px;width:20px;height:20px`;document.body.appendChild(r);setTimeout(()=>r.remove(),600)});
setInterval(()=>{const el=document.getElementById("hn");if(!el)return;fI=(fI+1)%SITE.nameFonts.length;el.style.fontFamily=`'${SITE.nameFonts[fI]}',sans-serif`},2500);

// ══════════ JSONBin COMMISSION SYSTEM ══════════

async function jbRead(){
    if(!SITE.jsonbin?.binId||!SITE.jsonbin?.apiKey)return null;
    try{
        const r=await fetch(`https://api.jsonbin.io/v3/b/${SITE.jsonbin.binId}/latest`,{headers:{"X-Access-Key":SITE.jsonbin.apiKey}});
        const d=await r.json();
        return d.record?.open??null;
    }catch(e){return null}
}

async function jbWrite(open){
    if(!SITE.jsonbin?.binId||!SITE.jsonbin?.apiKey){uC(open);sm("Local only — set up JSONBin","w");return}
    try{
        await fetch(`https://api.jsonbin.io/v3/b/${SITE.jsonbin.binId}`,{
            method:"PUT",
            headers:{"Content-Type":"application/json","X-Access-Key":SITE.jsonbin.apiKey},
            body:JSON.stringify({open})
        });
        uC(open);jbOk=true;
        sm("✓ Saved — everyone sees this now","ok");
    }catch(e){uC(open);sm("Save failed — try again","w")}
}

async function jbInit(){
    const val=await jbRead();
    if(val!==null){jbOk=true;uC(val)}
    else{uC(COMMISSIONS_OPEN)}
}

function uC(o){
    cO=o;
    const b=document.getElementById("ncb"),t=document.getElementById("nct"),h=document.getElementById("hcm"),ht=document.getElementById("hct");
    if(b)b.className=o?"cb o":"cb c";if(t)t.textContent=o?"OPEN":"CLOSED";
    if(h)h.className=o?"hcm o":"hcm c";if(ht)ht.textContent=o?"COMMISSIONS OPEN":"COMMISSIONS CLOSED";
    const s=document.getElementById("as"),g=document.getElementById("tg"),d=document.querySelector(".hdot");
    if(s){s.textContent=o?"Status: ✅ Open":"Status: ❌ Closed";s.style.color=o?"#f0f0f0":"#444"}
    if(g)g.checked=o;if(d)d.className=o?"hdot on":"hdot off";
}
function sm(t,c){const m=document.getElementById("am");m.textContent=t;m.className="amg "+c;setTimeout(()=>{m.textContent="";m.className="amg"},3500)}

// ADMIN
function ckP(){const i=document.getElementById("pw"),e=document.getElementById("pwe");if(i.value===SITE.adminPassword){document.getElementById("pws").style.display="none";document.getElementById("adc").classList.add("u");document.getElementById("ab").textContent=jbOk?"● LIVE — everyone sees":"○ LOCAL — only you";document.getElementById("ab").className="abg "+(jbOk?"lv":"lo");uC(cO)}else{e.textContent="Wrong password";i.value="";setTimeout(()=>e.textContent="",2000)}}
function xA(){document.getElementById("adm").classList.remove("show");document.getElementById("pws").style.display="";document.getElementById("adc").classList.remove("u");document.getElementById("pw").value=""}
document.addEventListener("keydown",e=>{if(e.ctrlKey&&e.shiftKey&&e.key==="K"){e.preventDefault();document.getElementById("adm").classList.add("show");setTimeout(()=>document.getElementById("pw").focus(),100)}});
document.getElementById("tg").addEventListener("change",function(){jbWrite(this.checked)});
document.getElementById("adm").addEventListener("click",function(e){if(e.target===this)xA()});

function oLb(s){document.getElementById("lbi").src=s;document.getElementById("lb").classList.add("show");document.body.style.overflow="hidden"}
function xLb(e){if(e&&e.target?.tagName==="IMG")return;document.getElementById("lb").classList.remove("show");document.body.style.overflow=""}

// BUILD
const lp=SITE.logoText.split("|");
document.getElementById("lg").innerHTML=`<div class="logo-ic"><img src="${pfp}" alt=""></div><div class="logo-tx">${lp[0]}${lp[1]?`<span>${lp[1]}</span>`:""}</div>`;
document.title=SITE.name+" | "+SITE.role;
document.getElementById("ha").innerHTML=`<img src="${pfp}" alt=""><div class="hdot ${cO?'on':'off'}"></div>`;
const nm=document.getElementById("hn");nm.textContent=SITE.name;nm.style.fontFamily=`'${SITE.nameFonts[0]}',sans-serif`;
document.getElementById("hrl").textContent=SITE.role;
document.getElementById("hmt").innerHTML=SITE.meta.map(m=>`<div class="hmi"><i class="${m.icon}"></i>${m.text}</div>`).join("");
document.getElementById("hbi").textContent=SITE.bio;
document.getElementById("hlk").innerHTML=`<a href="https://x.com/${SITE.twitter}" target="_blank" class="hl gl"><i class="fab fa-x-twitter"></i></a><a href="${SITE.discordUrl}" target="_blank" class="hl gl"><i class="fab fa-discord"></i></a>`;
document.getElementById("hst").innerHTML=SITE.stats.map(s=>`<div class="st"><div class="stv">${s.value}</div><div class="stl">${s.label}</div></div>`).join("");
document.getElementById("svn").textContent=SITE.servicesNote;
document.getElementById("svg").innerHTML=SITE.services.map(s=>`<div class="sc gl fi"><i class="${s.icon} ic"></i><h4>${s.title}</h4><p>${s.desc}</p></div>`).join("");

// PROJECTS
const pg=document.getElementById("pjg");
const vp=PROJECTS.filter(p=>p&&!p.includes("BURAYA")&&!p.includes("LINKI"));
if(vp.length){
    pg.innerHTML=vp.map((img,i)=>`<div class="pc gl fi" onclick="oLb('${img.replace(/'/g,"\\'")}')" style="animation-delay:${i*.06}s"><div class="pim"><img src="${img}" alt="UI" loading="lazy"><div class="pov"><span><i class="fas fa-expand"></i> Full Size</span></div></div></div>`).join("");
}else{
    pg.innerHTML=`<div style="text-align:center;color:var(--t3);font-size:11px;padding:40px">Add image links to PROJECTS array</div>`;
}

const pr=SITE.pricing;
document.getElementById("prd").textContent=pr.desc;
document.getElementById("prc").innerHTML=pr.tiers.map(t=>`<div class="pcd gl"><div class="pcl">${t.label}</div><div class="pcp">R$ ${t.price}</div><div class="pcn">${t.note}</div></div>`).join("");
document.getElementById("pri").innerHTML=`<div class="pit">What's Included</div><ul>${pr.includes.map(f=>`<li>${f}</li>`).join("")}</ul>`;
document.getElementById("prf").textContent=pr.note;
document.getElementById("ctd").textContent=SITE.contactDesc;
document.getElementById("ctl").innerHTML=`<a href="https://x.com/${SITE.twitter}" target="_blank" class="cl gl"><div class="ci"><i class="fab fa-x-twitter"></i></div><div><div class="cp">Twitter / X</div><div class="cv">@${SITE.twitter}</div></div></a><a href="${SITE.discordUrl}" target="_blank" class="cl gl"><div class="ci"><i class="fab fa-discord"></i></div><div><div class="cp">Discord</div><div class="cv">${SITE.discord}</div></div></a>`;
document.getElementById("ft").textContent=SITE.footer;
document.getElementById("fss").innerHTML=`<a href="https://x.com/${SITE.twitter}" target="_blank"><i class="fab fa-x-twitter"></i></a><a href="${SITE.discordUrl}" target="_blank"><i class="fab fa-discord"></i></a>`;

jbInit();

window.addEventListener("scroll",()=>{document.getElementById("nv").classList.toggle("s",scrollY>40);document.querySelectorAll("section[id]").forEach(s=>{const a=document.querySelector(`.nl a[href="#${s.id}"]`);if(a){const t=s.offsetTop-130;a.classList.toggle("on",scrollY>=t&&scrollY<t+s.offsetHeight)}})});
function cm(){document.getElementById("nl").classList.remove("open");document.getElementById("hm").classList.remove("on")}
document.addEventListener("click",e=>{const a=e.target.closest('a[href^="#"]');if(a){const t=document.querySelector(a.getAttribute("href"));if(t){e.preventDefault();t.scrollIntoView({behavior:"smooth"})}}});
new IntersectionObserver(en=>{en.forEach((e,i)=>{if(e.isIntersecting)setTimeout(()=>e.target.classList.add("v"),i*30)})},{threshold:.04}).observe(document.querySelector(".fi")||document.body);
document.querySelectorAll(".fi").forEach(e=>new IntersectionObserver(en=>{en.forEach(e=>{if(e.isIntersecting)e.target.classList.add("v")})},{threshold:.04}).observe(e));
</script>
